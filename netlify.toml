[build]
  publish = "dist"
  command = "npm run build"

# Environment variables — set these in Netlify UI (Site Settings → Environment variables)
# Do NOT commit actual values here.
[build.environment]
  NODE_VERSION = "22"

[build.processing.html]
  pretty_urls = false

# Cache-busting for hashed Astro assets (1 year)
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Sitemap: no cache so search engines always get the latest
[[headers]]
  for = "/sitemap*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# robots.txt: short TTL so changes propagate quickly
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Sanity webhook rebuilds:
# 1. Go to Netlify UI → Site Settings → Build & Deploy → Build hooks
# 2. Create a hook named "Sanity Content Update"
# 3. Copy the hook URL (https://api.netlify.com/build_hooks/XXXX)
# 4. In Sanity Studio → API → Webhooks → add that URL
# See DEPLOYMENT.md for full step-by-step instructions.
